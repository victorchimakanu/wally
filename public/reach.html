<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wally — The Reach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="reach.css?v=8">
</head>
<body>

<!-- ambient art layer -->
<div class="ambient" aria-hidden="true">
  <div class="ambient__field ambient__field--green"></div>
  <div class="ambient__field ambient__field--coral"></div>
  <div class="ambient__field ambient__field--deep"></div>
  <svg class="ambient__bird ambient__bird--1" width="26" height="12" viewBox="0 0 26 12" fill="none">
    <path d="M2 9 C7 2, 11 2, 13 7 C15 2, 19 2, 24 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </svg>
  <svg class="ambient__bird ambient__bird--2" width="26" height="12" viewBox="0 0 26 12" fill="none">
    <path d="M2 9 C7 2, 11 2, 13 7 C15 2, 19 2, 24 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </svg>
</div>

<!-- connection-lost banner -->
<div id="signal-lost" class="signal-lost" hidden>
  <svg width="20" height="10" viewBox="0 0 26 12" fill="none" aria-hidden="true">
    <path d="M2 9 C7 2, 11 2, 13 7 C15 2, 19 2, 24 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  signal lost — reaching for the link
</div>

<!-- the echo: artwork ghosted behind an active conversation -->
<svg class="chat-echo" viewBox="0 0 640 520" aria-hidden="true">
  <use href="#reach-scene"></use>
</svg>

<div class="shell">

<!-- chat sessions sidebar -->
<aside class="sessions" aria-label="Chat history">
  <button id="new-chat" class="sessions__new" type="button">+ new chat</button>
  <div class="sessions__label">history</div>
  <nav id="session-list" class="sessions__list"></nav>
  <div class="sessions__note">saved on this device</div>
</aside>

<div class="app">

  <!-- topbar -->
  <header class="topbar">
    <div class="topbar__brand">
      <h1 class="topbar__wordmark">Wally</h1>
      <svg class="topbar__glyph" width="24" height="12" viewBox="0 0 26 12" fill="none" aria-hidden="true">
        <path d="M2 9 C7 2, 11 2, 13 7 C15 2, 19 2, 24 9" stroke="#F2A03D" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="13" cy="8.5" r="1.6" fill="#3DD68C"/>
      </svg>
    </div>
    <div class="topbar__right">
      <div class="topbar__tag"><span class="status-dot" aria-hidden="true"></span>on-device agentic finance</div>
      <a class="topbar__docs" href="http://localhost:3001" target="_blank" rel="noopener">docs &#8599;</a>
    </div>
  </header>

  <!-- balance strip -->
  <div id="balance-track" class="balance-track">
    <div class="tile tile--skeleton"><div class="sk"></div><div class="sk sk--amt"></div></div>
    <div class="tile tile--skeleton"><div class="sk"></div><div class="sk sk--amt"></div></div>
    <div class="tile tile--skeleton"><div class="sk"></div><div class="sk sk--amt"></div></div>
  </div>

  <!-- chat -->
  <main id="chat" class="chat chat--empty">

    <div class="centerpiece">
      <div class="centerpiece__glow"></div>

      <!-- ═══════════ THE REACH ═══════════ -->
      <svg class="centerpiece__art" viewBox="0 0 640 520" fill="none" role="img"
           aria-label="A small dome-headed robot reaches up toward a wallet-shaped bird in flight, their tips almost touching.">
        <defs>
          <radialGradient id="blobGreen" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1E9E62" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#1E9E62" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="blobCoral" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#F2A03D" stop-opacity="0.32"/>
            <stop offset="100%" stop-color="#F2A03D" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0.2">
            <stop offset="0%" stop-color="#EFE8D3"/>
            <stop offset="60%" stop-color="#F5EFDF"/>
            <stop offset="100%" stop-color="#E2D8BE"/>
          </linearGradient>
          <linearGradient id="domeGrad" x1="0" y1="0" x2="0.8" y2="1">
            <stop offset="0%" stop-color="#FAF5E8"/>
            <stop offset="100%" stop-color="#E2D8BE"/>
          </linearGradient>
          <linearGradient id="birdGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#F2A03D"/>
            <stop offset="100%" stop-color="#F2762E"/>
          </linearGradient>
          <linearGradient id="wingWarm" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#F2762E"/>
            <stop offset="100%" stop-color="#F2A03D"/>
          </linearGradient>
        </defs>

        <g id="reach-scene">

          <!-- soft color fields -->
          <circle cx="200" cy="320" r="185" fill="url(#blobGreen)"/>
          <circle cx="450" cy="140" r="150" fill="url(#blobCoral)"/>

          <!-- distant birds -->
          <path d="M136 92 C140 87, 143 87, 145 91 C147 87, 150 87, 154 92" stroke="#9DB8A6" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
          <path d="M508 66 C512 61, 515 61, 517 65 C519 61, 522 61, 526 66" stroke="#9DB8A6" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>
          <path d="M556 108 C559 104, 561 104, 563 107 C565 104, 567 104, 570 108" stroke="#9DB8A6" stroke-width="1.4" stroke-linecap="round" opacity="0.3"/>

          <!-- floating leaves -->
          <g transform="translate(112 200) rotate(-32)" opacity="0.85">
            <path d="M0 0 Q10 -10 22 0 Q10 10 0 0 Z" fill="#1E9E62"/>
            <path d="M2 0 L20 0" stroke="#0E1F17" stroke-width="0.8" opacity="0.5"/>
          </g>
          <g transform="translate(548 268) rotate(24)" opacity="0.6">
            <path d="M0 0 Q9 -9 19 0 Q9 9 0 0 Z" fill="#3DD68C"/>
            <path d="M2 0 L17 0" stroke="#0E1F17" stroke-width="0.7" opacity="0.5"/>
          </g>
          <g transform="translate(96 384) rotate(12)" opacity="0.5">
            <path d="M0 0 Q8 -8 17 0 Q8 8 0 0 Z" fill="#1E9E62"/>
          </g>
          <g transform="translate(500 380) rotate(-18)" opacity="0.45">
            <path d="M0 0 Q8 -8 17 0 Q8 8 0 0 Z" fill="#3DD68C"/>
          </g>

          <!-- sparks near the gap -->
          <path d="M356 158 L359 165 L366 168 L359 171 L356 178 L353 171 L346 168 L353 165 Z" fill="#F2A03D" opacity="0.9"/>
          <circle cx="376" cy="196" r="2.4" fill="#F2762E" opacity="0.8"/>
          <circle cx="322" cy="152" r="1.8" fill="#F2A03D" opacity="0.7"/>
          <circle cx="392" cy="230" r="1.6" fill="#3DD68C" opacity="0.7"/>

          <!-- ground shadow -->
          <ellipse cx="234" cy="480" rx="118" ry="14" fill="#081409" opacity="0.55"/>

          <g transform="rotate(-6 235 470)">

            </g>

              <rect x="316" y="452" width="16" height="6" rx="3" fill="#0E1F17" opacity="0.35"/>

<script src="app.js?v=8"></script>
<script>
/* prompt chips — works against the shared contract only (#input + #send) */
document.querySelectorAll('.chip').forEach(function (chip) {
  chip.addEventListener('click', function () {
    var input = document.getElementById('input');
    input.value = chip.getAttribute('data-fill');
    input.dispatchEvent(new Event('input', { bubbles: true }));
    input.focus();
    document.getElementById('send').click();
  });
});
</script>
