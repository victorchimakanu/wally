  <circle cx="29.6" cy="13.4" r="2" fill="#3DD68C"/>
  <!-- robot body -->
  <rect x="6" y="26" width="17" height="13" rx="3.5" fill="#16301F" stroke="#3DD68C" stroke-width="2"/>
  <!-- robot dome head -->
  <path d="M8.5 26 a6.5 6.5 0 0 1 12 0 Z" fill="#16301F" stroke="#3DD68C" stroke-width="2"/>
  <!-- eye lens -->
